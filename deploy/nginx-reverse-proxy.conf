# Barstock — nginx reverse proxy snippet for VPS deployments
# TLS is terminated here; Node.js runs plain HTTP on 127.0.0.1:3000.
#
# These X-Forwarded-* headers are required for the CSRF origin check
# in apps/web/src/middleware.ts to derive the correct expected origin.

server {
    listen 443 ssl http2;
    server_name barstock.example.com;

    ssl_certificate     /etc/letsencrypt/live/barstock.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barstock.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;

        # Required for CSRF origin check
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Host              $host;

        # Standard forwarding
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SSE / WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name barstock.example.com;
    return 301 https://$host$request_uri;
}

# Required for WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
